spring:
  application:
    name: distributed-job-scheduler

  profiles:
    default: api,worker

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/jobscheduler
    username: jobscheduler
    password: jobscheduler_secret
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC

server:
  port: 8080

# ── JWT Configuration ─────────────────────────────────
jwt:
  secret: "bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjAyNA=="
  expiration-ms: 86400000  # 24 hours

# ── Worker Configuration ──────────────────────────────
worker:
  enabled: true
  id: ${random.uuid}
  poll-interval-ms: 500
  heartbeat-interval-ms: 15000
  stale-worker-threshold-ms: 60000
  max-concurrent-jobs: 10
  shutdown-timeout-seconds: 30

# ── Cron Scheduler Configuration ──────────────────────
cron-scheduler:
  enabled: true
  poll-interval-ms: 10000

# ── OpenAPI / Swagger ─────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ── Logging ───────────────────────────────────────────
logging:
  level:
    root: INFO
    com.jobscheduler: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
