version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobscheduler-postgres
    environment:
      POSTGRES_DB: jobscheduler
      POSTGRES_USER: jobscheduler
      POSTGRES_PASSWORD: jobscheduler_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobscheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
